<div class="edit-page">

  <!-- Loading -->
  <div *ngIf="loading" class="edit-loading">
    <div class="spinner-border edit-spinner" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="edit-loading__text">Cargando datos del cliente...</p>
  </div>

  <!-- Error -->
  <div *ngIf="!loading && errorMsg" class="edit-error">
    <span class="edit-error__icon">&#9888;</span>
    {{ errorMsg }}
  </div>

  <!-- Formulario -->
  <div *ngIf="!loading && !errorMsg" class="edit-card" [@fadeIn]>
    <div class="edit-header">
      <div class="edit-header__icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.029 10 8 10c-2.029 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/>
        </svg>
      </div>
      <h2 class="edit-header__title">Editar Cliente</h2>
      <p class="edit-header__sub">Modificá los datos del cliente cuando necesites</p>
    </div>

    <form #editForm="ngForm" (ngSubmit)="onSubmit()" class="edit-form">

      <div class="ef-field">
        <label class="ef-label">Nombre</label>
        <input type="text" id="name" class="ef-input" name="name"
               placeholder="Nombre del cliente"
               [(ngModel)]="cliente.name" required>
      </div>

      <div class="ef-field">
        <label class="ef-label">Contacto</label>
        <input type="text" id="contact" class="ef-input" name="contact"
               placeholder="Teléfono de contacto"
               [(ngModel)]="cliente.contact" required>
      </div>

      <div class="ef-field">
        <label class="ef-label">Email</label>
        <input type="email" id="email" class="ef-input" name="email"
               placeholder="correo@ejemplo.com"
               [(ngModel)]="cliente.email" required>
      </div>

      <div class="ef-field">
        <label class="ef-label">CUIT / Clave <span class="ef-optional">(opcional)</span></label>
        <input type="text" id="clave" class="ef-input" name="clave"
               placeholder="00-00000000-0"
               [(ngModel)]="cliente.clave">
      </div>

      <div class="ef-field">
        <label class="ef-label">Dirección</label>
        <input type="text" id="direccion" class="ef-input" name="direccion"
               placeholder="Dirección del cliente"
               [(ngModel)]="cliente.direccion" required>
      </div>

      <div class="ef-field">
        <label class="ef-label">Fecha del Presupuesto</label>
        <input type="date" id="budgetDate" class="ef-input" name="budgetDate"
               [(ngModel)]="cliente.budgetDate" required>
      </div>

      <div class="ef-field">
        <label class="ef-label">Detalles adicionales <span class="ef-optional">(opcional)</span></label>
        <textarea id="additionalDetails" class="ef-input ef-textarea" name="additionalDetails"
                  rows="3" placeholder="Información extra del cliente"
                  [(ngModel)]="cliente.additionalDetails"></textarea>
      </div>

      <div class="ef-actions">
        <button type="submit" class="ef-btn ef-btn--primary" [disabled]="editForm.invalid">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M10.97 4.97a.75.75 0 0 1 1.07 1.05l-3.99 4.99a.75.75 0 0 1-1.08.02L4.324 8.384a.75.75 0 1 1 1.06-1.06l2.094 2.093 3.473-4.425z"/>
          </svg>
          Guardar cambios
        </button>
        <button type="button" class="ef-btn ef-btn--ghost" (click)="cancelar()">
          Cancelar
        </button>
      </div>

    </form>
  </div>

</div>
